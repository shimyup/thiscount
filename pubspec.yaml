name: thiscount
description: "Thiscount - Pick up coupons and discounts around you"
publish_to: 'none'
homepage: 'https://globaldrift.com'
issue_tracker: 'https://globaldrift.com/support'
version: 1.0.0+288

environment:
  # Build 272 (P2): Flutter SDK 최소 버전 명시 — withValues(alpha:) API 호환성.
  sdk: ^3.11.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6
  geolocator: ^13.0.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  http: ^1.2.2
  dotted_border: ^2.1.0
  flutter_image_compress: ^2.3.0
  purchases_flutter: ^8.0.0
  gal: ^1.3.0
  share_plus: ^10.0.0
  encrypt: ^5.0.3
  audioplayers: ^6.1.0
  # Android FLAG_SECURE + iOS screen-capture detection. 교환권 뷰어에서 호출.
  screen_protector: ^1.4.5+1

dependency_overrides:
  # objective_c 9.x (native assets)가 iOS 시뮬레이터에서 SdkRoot 미설정으로
  # platform 2(device) 바이너리를 시뮬레이터에 배포하는 Flutter 3.41 버그 우회.
  # path_provider_foundation 2.4.0은 objective_c 의존성 없는 마지막 버전.
  path_provider_foundation: 2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/branding/
    - assets/sounds/
    - assets/cities.json
    - assets/countries_bounds.json
