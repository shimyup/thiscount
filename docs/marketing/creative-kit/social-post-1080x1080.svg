<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131E2E"/>
      <stop offset="100%" stop-color="#2D4E79"/>
    </linearGradient>
    <linearGradient id="sacc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5C770"/>
      <stop offset="100%" stop-color="#F08A40"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#sbg)"/>
  <circle cx="135" cy="210" r="132" fill="#4E74A4" opacity="0.3"/>
  <circle cx="970" cy="200" r="144" fill="#6D94C6" opacity="0.24"/>

  <text x="84" y="170" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="64" font-weight="700" fill="#F9FCFF">Letter Go</text>
  <text x="84" y="232" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="36" font-weight="500" fill="#D4E5FF">세계로 보내는 랜덤 편지</text>

  <rect x="84" y="284" width="912" height="86" rx="18" ry="18" fill="#0B1625" opacity="0.62"/>
  <text x="118" y="339" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="34" font-weight="600" fill="#F4F8FF">매일 한 통, 세계 누군가에게 닿는 메시지</text>

  <rect x="84" y="416" width="912" height="438" rx="28" ry="28" fill="#0B1626" stroke="#7EA2D2" stroke-width="5" stroke-dasharray="14 10"/>
  <text x="304" y="654" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="42" font-weight="600" fill="#CFE0FF">캠페인 스크린샷/UGC 이미지 삽입</text>

  <rect x="84" y="904" width="912" height="108" rx="20" ry="20" fill="url(#sacc)"/>
  <text x="184" y="971" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="40" font-weight="700" fill="#1E2430">지금 시작하고 첫 편지를 세계로 보내세요</text>
